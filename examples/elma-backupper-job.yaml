# Kubernetes Job для однократного резервного копирования ELMA365
# Подходит для запуска резервного копирования один раз или по требованию
# Для периодического выполнения используйте CronJob (см. elma-backupper-cronjob.yaml)

apiVersion: batch/v1
kind: Job
metadata:
  name: elma-backup-once
  namespace: elma365
  labels:
    app: elma-backupper
    mode: job
spec:
  # Шаблон для Pod, который будет создан из этого Job
  template:
    metadata:
      labels:
        app: elma-backupper
    spec:
      # ServiceAccount с необходимыми правами
      serviceAccountName: elma-backupper
      
      # Секурность контейнера
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        runAsNonRoot: true
      
      # Контейнер с утилитой
      containers:
      - name: backupper
        image: elma365-backupper:1.0.17
        imagePullPolicy: IfNotPresent
        
        # Переменные окружения для конфигурации
        env:
        # Тип резервной копии
        - name: BACKUP_DST
          value: "filesystem"  # или "s3"
        - name: BACKUP_LIFE
          value: "7"
        
        # Kubernetes параметры
        - name: KUBECONFIG
          value: "/home/elma/.kube/config"
        - name: K8S_NS_APP
          value: "elma365"
        - name: K8S_NS_DBS
          value: "elma365-dbs"
        
        # Пути для файловой системы
        - name: TMP_DIR
          value: "/opt/elma365/backupper/tmp"
        - name: BACKUP_PATH
          value: "/opt/elma365/backupper/backup/"
        - name: STORAGE_PATH
          value: "/opt/elma365/backupper/storage/"
        
        # Логирование
        - name: GLOBAL_LOG_LEVEL
          value: "INFO"
        
        # S3 конфигурация (раскомментируйте для S3):
        # - name: BACKUP_DST
        #   value: "s3"
        # - name: S3_BUCKET_NAME
        #   value: "elma-backups"
        # - name: S3_HOST
        #   value: "minio.storage"
        # - name: S3_PORT
        #   value: "9000"
        # - name: S3_ROOT_USER
        #   valueFrom:
        #     secretKeyRef:
        #       name: s3-credentials
        #       key: access-key
        # - name: S3_ROOT_PASSWORD
        #   valueFrom:
        #     secretKeyRef:
        #       name: s3-credentials
        #       key: secret-key
        # - name: S3_SSL_ENABLED
        #   value: "false"
        
        # Запросы и лимиты ресурсов
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2
            memory: 2Gi
        
        # Монтирование томов
        volumeMounts:
        - name: kubeconfig
          mountPath: /home/elma/.kube
          readOnly: true
        - name: backup-storage
          mountPath: /opt/elma365/backupper/backup
        - name: tmp-storage
          mountPath: /opt/elma365/backupper/tmp
      
      # Политика перезагрузки: не перезагружать Pod при ошибке
      restartPolicy: Never
      
      # Определение томов
      volumes:
      - name: kubeconfig
        secret:
          secretName: kubeconfig
          defaultMode: 0400
      - name: backup-storage
        persistentVolumeClaim:
          claimName: backup-pvc
      - name: tmp-storage
        emptyDir:
          sizeLimit: 50Gi
  
  # Количество попыток перезагрузки Pod при ошибке
  backoffLimit: 3
  
  # Время ожидания перед следующей попыткой (в секундах)
  # backoffLimit применён с экспоненциальной задержкой

---
# Использование:
# 1. Убедитесь, что ServiceAccount создан:
#    kubectl apply -f elma-backupper-rbac.yaml
#
# 2. Убедитесь, что PVC существует:
#    kubectl get pvc backup-pvc -n elma365
#
# 3. Создайте Secret с kubeconfig (если необходимо):
#    kubectl create secret generic kubeconfig --from-file=config=/path/to/kubeconfig -n elma365
#
# 4. Примените Job:
#    kubectl apply -f elma-backupper-job.yaml
#
# 5. Проверьте статус:
#    kubectl get jobs -n elma365
#    kubectl describe job elma-backup-once -n elma365
#
# 6. Посмотрите логи:
#    kubectl logs job/elma-backup-once -n elma365
#    kubectl logs -f job/elma-backup-once -n elma365
#
# 7. Удалите Job, когда это необходимо:
#    kubectl delete job elma-backup-once -n elma365
