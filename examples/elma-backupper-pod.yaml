# Kubernetes Pod для резервного копирования ELMA365 backupper
# Этот пример демонстрирует запуск резервного копирования как отдельный Pod
# Подходит для разовых или отладочных операций

apiVersion: v1
kind: Pod
metadata:
  name: elma-backupper-pod
  namespace: elma365
  labels:
    app: elma-backupper
    mode: standalone
spec:
  # ServiceAccount с необходимыми правами для доступа к K8s API
  serviceAccountName: elma-backupper
  
  # Контейнер будет запущен с определённым SecurityContext
  securityContext:
    runAsUser: 10001  # UID пользователя elma
    runAsGroup: 10001
    fsGroup: 10001
    runAsNonRoot: true
  
  # Контейнер приложения
  containers:
  - name: backupper
    image: elma365-backupper:1.0.17
    imagePullPolicy: IfNotPresent
    
    # Переменные окружения для конфигурации
    env:
    # Основные параметры резервной копии
    - name: BACKUP_DST
      value: "filesystem"  # Вариант: filesystem или s3
    - name: BACKUP_LIFE
      value: "7"  # Дни хранения резервных копий
    
    # Параметры Kubernetes (для доступа к компонентам)
    - name: KUBECONFIG
      value: "/home/elma/.kube/config"
    - name: K8S_NS_APP
      value: "elma365"  # Namespace с приложением ELMA365
    - name: K8S_NS_DBS
      value: "elma365-dbs"  # Namespace с базами данных
    
    # Параметры локального резервного копирования (Filesystem)
    - name: TMP_DIR
      value: "/opt/elma365/backupper/tmp"
    - name: BACKUP_PATH
      value: "/opt/elma365/backupper/backup/"
    - name: STORAGE_PATH
      value: "/opt/elma365/backupper/storage/"
    
    # Логирование
    - name: GLOBAL_LOG_LEVEL
      value: "INFO"  # Варианты: DEBUG, INFO, WARNING, ERROR, SUCCESS
    
    # Для S3 резервного копирования раскомментируйте и заполните:
    # - name: BACKUP_DST
    #   value: "s3"
    # - name: S3_BUCKET_NAME
    #   value: "elma-backups"
    # - name: S3_HOST
    #   value: "minio.storage.svc.cluster.local"
    # - name: S3_PORT
    #   value: "9000"
    # - name: S3_ROOT_USER
    #   valueFrom:
    #     secretKeyRef:
    #       name: s3-credentials
    #       key: access-key
    # - name: S3_ROOT_PASSWORD
    #   valueFrom:
    #     secretKeyRef:
    #       name: s3-credentials
    #       key: secret-key
    # - name: S3_SSL_ENABLED
    #   value: "false"
    
    # Ресурсы контейнера
    resources:
      requests:
        cpu: 500m          # Минимальный запрос CPU
        memory: 512Mi      # Минимальный запрос памяти
      limits:
        cpu: 2             # Максимум CPU
        memory: 2Gi        # Максимум памяти
    
    # Монтирование томов
    volumeMounts:
    # Том для kubeconfig (для доступа к K8s API)
    - name: kubeconfig
      mountPath: /home/elma/.kube
      readOnly: true
    
    # Том для резервных копий
    - name: backup-storage
      mountPath: /opt/elma365/backupper/backup
    
    # Том для временных файлов (опционально)
    - name: tmp-storage
      mountPath: /opt/elma365/backupper/tmp
  
  # Политика перезагрузки Pod
  restartPolicy: Never
  
  # Определение томов
  volumes:
  # Secret с kubeconfig для доступа к K8s
  - name: kubeconfig
    secret:
      secretName: kubeconfig
      defaultMode: 0400  # Права: 400 (read-only for owner)
  
  # PersistentVolumeClaim для основного хранилища резервных копий
  - name: backup-storage
    persistentVolumeClaim:
      claimName: backup-pvc
  
  # EmptyDir для временных файлов (используется во время выполнения Pod)
  - name: tmp-storage
    emptyDir:
      sizeLimit: 50Gi  # Лимит размера временного тома

---
# (Опционально) Пример создания Secret с kubeconfig, если его нет
# kubectl create secret generic kubeconfig --from-file=config=/path/to/kubeconfig -n elma365

